# Foundry configuration for yieldomega smart contracts (MegaEVM / MegaETH).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true
fs_permissions = [{ access = "read", path = "../airdrop" }]
# MegaEVM runtime bytecode cap (512 KiB), not Ethereum EIP-170 (24 KiB).
# https://docs.megaeth.com/spec/megaevm/contract-limits
code_size_limit = 524288

# RPC labels for `forge script` / `--fork-url` (URLs from official docs; verify if they change).
[rpc_endpoints]
megaeth = "https://mainnet.megaeth.com/rpc"
megaeth_testnet = "https://carrot.megaeth.com/rpc"

# Invariant tests: handler depth + runs (see `test/*Invariant.t.sol`).
[invariant]
runs = 256
depth = 25
fail_on_revert = false

# CI: deterministic fuzz budget; run with `FOUNDRY_PROFILE=ci forge test`.
[profile.ci]
fuzz = { runs = 256 }
