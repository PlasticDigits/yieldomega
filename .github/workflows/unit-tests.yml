# Minimal unit gate: forge test; cargo clippy -D warnings + cargo test (indexer). No repository secrets.
# Forge deps: git submodules under contracts/lib/ (see .gitmodules).
name: unit-tests

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  forge-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Forge build
        run: forge build --sizes

      - name: Forge test (CI profile)
        env:
          FOUNDRY_PROFILE: ci
        run: forge test -vv

  cargo-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: yieldomega_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yieldomega_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      YIELDOMEGA_PG_TEST_URL: postgres://postgres:postgres@localhost:5432/yieldomega_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm test

  simulations-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simulations
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Unit tests
        run: PYTHONPATH=. python3 -m unittest discover -s tests -v

  playwright-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, build, browsers, E2E
        run: |
          npm ci
          npm run build
          npx playwright install --with-deps
          npm run test:e2e
